# Always defines the service 'vippet' with the same name, independent of hardware profile.
# Device setup is handled in override files.
x-vippet: &vippet
  image: docker.io/intel/vippet-app:${DOCKER_TAG}
  build:
    context: .
    target: ${TARGET:-prod}
    dockerfile: vippet/Dockerfile
    args:
      http_proxy:
      https_proxy:
      no_proxy:
  healthcheck:
    test: ["CMD", "curl", "--fail", "--silent", "--show-error", "--output", "/dev/null", "http://localhost:7860/api/v1/health"]
    interval: 10s
    timeout: 5s
    retries: 3
    start_period: 5s
    start_interval: 1s
  restart: on-failure:5
  depends_on:
    mediamtx:
      condition: service_started
  environment:
    GST_DEBUG: "1"
    LOG_LEVEL: INFO
    WEB_SERVER_LOG_LEVEL: WARNING
    MODELS_PATH: /models/output
    SUPPORTED_MODELS_FILE: /models/supported_models.yaml
    INPUT_VIDEO_DIR: /videos/input
    OUTPUT_VIDEO_DIR: /videos/output
    SIMPLE_VIEW_VISIBLE_ELEMENTS: "*src,urisourcebin,gva*,*sink,source"
    SIMPLE_VIEW_INVISIBLE_ELEMENTS: "gvafpscounter,gvametapublish,gvametaconvert,gvawatermark"
    LIVE_STREAM_SERVER_HOST: ${LIVE_STREAM_SERVER_HOST:-mediamtx}
    LIVE_STREAM_SERVER_PORT: ${LIVE_STREAM_SERVER_PORT:-8554}
    http_proxy: ${http_proxy}
    https_proxy: ${https_proxy}
    no_proxy: "${no_proxy:+${no_proxy},}mediamtx"
  device_cgroup_rules:
    # Broad access to USB devices is required to support a wide range of USB cameras.
    - 'c 189:* rmw'
    - 'a 189:* rwm'
  volumes:
    - "/dev:/dev"
    - ./shared/collector-signals:/home/dlstreamer/vippet/.collector-signals
    - ./shared/models/:/models
    - ./shared/videos/:/videos
    - ./shared/scripts/:/scripts
    - ./shared/onvif/:/onvif

services:
  vippet-ui:
    image: docker.io/intel/vippet-ui:${DOCKER_TAG}
    build:
      context: .
      dockerfile: ui/Dockerfile
      args:
        http_proxy:
        https_proxy:
        no_proxy:
    container_name: ui
    ports:
      - "80:80"
    restart: on-failure:5
    depends_on:
      vippet:
        condition: service_healthy
    environment:
      http_proxy: ${http_proxy}
      https_proxy: ${https_proxy}
      no_proxy: "${no_proxy:+${no_proxy},}mediamtx"
    volumes:
      - ./shared/videos/:/videos
      - ./vippet/api/static:/usr/share/nginx/html/static
  models:
    profiles: [do-not-start]
    image: docker.io/intel/vippet-models:${DOCKER_TAG}
    build:
      context: .
      dockerfile: models/Dockerfile
      args:
        http_proxy:
        https_proxy:
        no_proxy:
    stdin_open: true
    tty: true
    container_name: models
    volumes:
      - ./shared/models/:/models
    environment:
      - MODELS_PATH=/models/output
      - SUPPORTED_MODELS_FILE=/models/supported_models.yaml
      - QUANTIZE_DATASET=coco128
      - MODEL_INSTALLATION=${MODEL_INSTALLATION:-once}
      - http_proxy=${http_proxy}
      - https_proxy=${https_proxy}
      - no_proxy=${no_proxy}
    command: './model_manager.sh'
  vippet:  # Always 'vippet', hardware config from override files
    <<: *vippet
    container_name: vippet
    ports:
      - "7860:7860"
  collector:
    image: docker.io/intel/vippet-collector:${DOCKER_TAG}
    build:
      context: ./collector
      dockerfile: Dockerfile
      args:
        http_proxy:
        https_proxy:
        no_proxy:
    container_name: collector
    ports:
      - "9273:9273"
    privileged: true
    devices:
      - "/sys:/sys"
      - "/dev:/dev"
      - "/run:/run"
      - "/proc:/proc"
    pid: host # qmassa needs it
    volumes:
      - "./shared/collector-signals:/app/.collector-signals"
    restart: on-failure:5
    depends_on:
      vippet:
        condition: service_healthy
    environment:
      http_proxy: ${http_proxy}
      https_proxy: ${https_proxy}
      no_proxy: ${no_proxy}
  mediamtx:
    image: bluenviron/mediamtx:1.15.6
    container_name: mediamtx
    environment:
      - MTX_LOGLEVEL=info
      - MTX_WEBRTCADDRESS=:8889
      - MTX_RTSPADDRESS=:8554
      - MTX_WEBRTCADDITIONALHOSTS=${HOST_IPS}
    ports:
      - "8554:8554"     # RTSP
      - "8889:8889"     # WebRTC signaling/HTTP
      - "8189:8189/udp" # WebRTC/ICE UDP 
  onvif-discovery:
    image: docker.io/intel/vippet-onvif-discovery:${DOCKER_TAG}
    build:
      context: ./onvif_discovery
      dockerfile: Dockerfile
      args:
        http_proxy:
        https_proxy:
        no_proxy:
    container_name: onvif-discovery
    network_mode: host
    restart: on-failure:5
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      OUTPUT_FILE: /out/onvif_cameras.json
      DISCOVERY_INTERVAL: 20
      http_proxy: ${http_proxy}
      https_proxy: ${https_proxy}
      no_proxy: ${no_proxy}
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    volumes:
      - ./shared/onvif:/out
  videogenerator:
    profiles: [do-not-start]
    image: docker.io/intel/vippet-videogenerator:${DOCKER_TAG}
    build:
      context: video_generator
      dockerfile: Dockerfile
      args:
        http_proxy:
        https_proxy:
        no_proxy:
    container_name: videogenerator
    volumes:
      - "./shared/videos/video-generator:/usr/src/app/output"
      - "./video_generator/config.json:/usr/src/app/config.json"
      - "./video_generator/background.gif:/usr/src/app/background.gif"
      - "./video_generator/images:/usr/src/app/images"
    environment:
      LOG_LEVEL: INFO
      http_proxy: ${http_proxy}
      https_proxy: ${https_proxy}
      no_proxy: ${no_proxy}

